name: Deploy Web

on:
  push:
    branches: [main]
    paths:
      - 'src/web/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: src/web

      - name: Build
        run: npm run build
        working-directory: src/web

      - name: Deploy to Azure Static Web Apps
        run: npx @azure/static-web-apps-cli deploy ./dist --deployment-token ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }} --env production
        working-directory: src/web
