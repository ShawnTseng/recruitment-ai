name: Deploy API

on:
  push:
    branches: [main]
    paths:
      - 'src/api/**'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore
        working-directory: src/api

      - name: Build
        run: dotnet build --no-restore -c Release
        working-directory: src/api

      - name: Test
        run: dotnet test --no-build -c Release --verbosity normal --filter "FullyQualifiedName!~PluginTests"
        working-directory: src/api

      - name: Publish
        run: dotnet publish RecruitmentAI.Api -c Release -o ./publish
        working-directory: src/api

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Ensure App Service is set to DOTNETCORE|10.0 before each deployment.
      # This prevents Oryx auto-detection from resetting the runtime to PHP/Node
      # when the published package does not contain an oryx-manifest.toml.
      - name: Configure App Service Runtime
        uses: azure/cli@v2
        with:
          inlineScript: |
            az webapp config set \
              --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
              --name recai-api \
              --linux-fx-version "DOTNETCORE|10.0" \
              --startup-file "dotnet RecruitmentAI.Api.dll"

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: recai-api
          package: src/api/publish
